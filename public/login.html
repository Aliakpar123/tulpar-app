<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TULPAR — Вход</title>
  <style>
    :root { --primary:#D4213D; --gold:#F5A623; --dark:#0D0D1A; --dark2:#1A1A2E; --card:#1E2A45; --border:rgba(255,255,255,0.1); --muted:#A0A8C0; --white:#FFFFFF; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark); color:var(--white); min-height:100vh; display:flex; flex-direction:column; }
    nav { background:rgba(13,13,26,0.98); border-bottom:1px solid var(--border); padding:0 5%; display:flex; align-items:center; justify-content:space-between; height:64px; }
    .nav-logo { font-size:1.6rem; font-weight:900; background:linear-gradient(90deg,#FF4D6A,#F5A623); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-logo span { -webkit-text-fill-color:var(--white); }
    nav a.lnk { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 5%; }
    .form-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:2.5rem; width:100%; max-width:420px; }
    .form-header { text-align:center; margin-bottom:2rem; }
    .form-header .icon { font-size:2.5rem; margin-bottom:0.8rem; }
    h1 { font-size:1.8rem; font-weight:900; margin-bottom:0.4rem; }
    .sub { color:var(--muted); font-size:0.95rem; }
    .form-group { margin-bottom:1.2rem; }
    label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:0.5rem; font-weight:600; }
    input { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; padding:0.85rem 1rem; color:var(--white); font-size:1rem; transition:border-color 0.2s; }
    input:focus { outline:none; border-color:var(--primary); }
    .btn { width:100%; background:linear-gradient(135deg,var(--primary),#A01530); color:#fff; border:none; padding:1rem; border-radius:12px; font-size:1.05rem; font-weight:700; cursor:pointer; margin-top:0.5rem; transition:all 0.2s; }
    .btn:hover { box-shadow:0 6px 24px rgba(212,33,61,0.4); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    .admin-toggle { text-align:center; margin-top:1.5rem; }
    .admin-toggle a { color:var(--muted); text-decoration:none; font-size:0.8rem; opacity:0.6; }
    .admin-toggle a:hover { color:var(--white); opacity:1; }
    .tabs { display:flex; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:1.8rem; overflow:hidden; }
    .tab { flex:1; padding:0.7rem; text-align:center; cursor:pointer; font-size:0.9rem; color:var(--muted); transition:all 0.2s; border:none; background:transparent; color:var(--muted); }
    .tab.active { background:var(--primary); color:#fff; font-weight:700; }
    .panel { display:none; }
    .panel.active { display:block; }
    .toast { position:fixed; top:80px; right:20px; padding:1rem 1.5rem; border-radius:12px; font-weight:600; z-index:100; }
    .toast.error { background:#3d1a1a; border:1px solid var(--primary); color:#FF8FA0; }
    .reg-link { text-align:center; margin-top:1.2rem; font-size:0.9rem; color:var(--muted); }
    .reg-link a { color:var(--primary); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">TUL<span>PAR</span></a>
  <a href="/register" class="lnk">Новый партнёр →</a>
</nav>
<main>
  <div class="form-card">
    <div class="form-header">
      <div class="icon">🔑</div>
      <h1>Вход</h1>
      <p class="sub">Войдите в свой кабинет</p>
    </div>

    <div class="tabs" id="tabsBar" style="display:none;">
      <button class="tab active" onclick="switchTab('partner')">Партнёр</button>
      <button class="tab" onclick="switchTab('admin')">Администратор</button>
    </div>

    <!-- PARTNER LOGIN -->
    <div class="panel active" id="panel-partner">
      <div class="form-group">
        <label>Номер телефона</label>
        <div style="display:flex;align-items:center;">
          <span style="background:rgba(255,255,255,0.1);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;padding:0.85rem 0.7rem;color:var(--white);font-size:1rem;white-space:nowrap;">+7</span>
          <input type="tel" id="partnerPhone" placeholder="700 000 00 00" maxlength="13" style="border-radius:0 10px 10px 0;" />
        </div>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="partnerPass" placeholder="Ваш пароль" />
      </div>
      <button class="btn" onclick="loginPartner()">Войти в кабинет →</button>
      <div class="reg-link" style="margin-top:0.8rem;"><a href="#" onclick="showResetPanel();return false;" style="color:var(--muted);font-weight:400;font-size:0.85rem;">Забыли пароль?</a></div>
      <div class="reg-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>

      <!-- PASSWORD RESET -->
      <div id="resetPanel" style="display:none;margin-top:1.2rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:1.2rem;">
        <div style="font-size:0.9rem;font-weight:700;margin-bottom:0.8rem;">Восстановление пароля</div>
        <div class="form-group">
          <label>Ваш номер телефона</label>
          <div style="display:flex;align-items:center;">
            <span style="background:rgba(255,255,255,0.1);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;padding:0.85rem 0.7rem;color:var(--white);font-size:1rem;white-space:nowrap;">+7</span>
            <input type="tel" id="resetPhone" placeholder="700 000 00 00" maxlength="13" style="border-radius:0 10px 10px 0;" />
          </div>
        </div>
        <button class="btn" style="font-size:0.95rem;padding:0.8rem;" onclick="requestReset()">Отправить запрос в Telegram →</button>
        <div id="resetMsg" style="margin-top:0.8rem;font-size:0.85rem;color:var(--muted);display:none;"></div>
      </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="panel" id="panel-admin">
      <div class="form-group">
        <label>Пароль администратора</label>
        <input type="password" id="adminPass" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="loginAdmin()">Войти в панель →</button>
    </div>
  </div>
</main>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='partner'&&i===0)||(tab==='admin'&&i===1)));
    document.getElementById('panel-partner').classList.toggle('active', tab==='partner');
    document.getElementById('panel-admin').classList.toggle('active', tab==='admin');
  }
  // Phone mask for all phone inputs
  function applyPhoneMask(input) {
    input.addEventListener('input', () => {
      let v = input.value.replace(/\D/g, '').slice(0, 10);
      if (v.length > 3 && v.length <= 6) v = v.slice(0,3)+' '+v.slice(3);
      else if (v.length > 6 && v.length <= 8) v = v.slice(0,3)+' '+v.slice(3,6)+' '+v.slice(6);
      else if (v.length > 8) v = v.slice(0,3)+' '+v.slice(3,6)+' '+v.slice(6,8)+' '+v.slice(8);
      input.value = v;
    });
  }
  applyPhoneMask(document.getElementById('partnerPhone'));
  document.getElementById('resetPhone') && applyPhoneMask(document.getElementById('resetPhone'));

  function showResetPanel() {
    const p = document.getElementById('resetPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
  async function requestReset() {
    const phone = '7' + document.getElementById('resetPhone').value.replace(/\D/g,'');
    if (phone.length < 11) return showToast('Введите полный номер');
    try {
      const res = await fetch('/api/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone}) });
      const data = await res.json();
      const msg = document.getElementById('resetMsg');
      msg.style.display = 'block';
      if (res.ok) { msg.style.color = '#27AE60'; msg.textContent = data.message; }
      else { msg.style.color = '#FF8FA0'; msg.textContent = data.error; }
    } catch(e) { showToast(e.message); }
  }

  function showToast(msg) {
    const t = document.createElement('div'); t.className='toast error'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),4000);
  }
  async function loginPartner() {
    const phone = '7' + document.getElementById('partnerPhone').value.replace(/\D/g,'');
    const password = document.getElementById('partnerPass').value;
    if (phone.length < 11) return showToast('Введите полный номер');
    if (!password) return showToast('Введите пароль');
    try {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, password}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('tulpar_token', data.token);
      localStorage.setItem('tulpar_partner', JSON.stringify(data.partner));
      location.href = '/dashboard';
    } catch(e) { showToast(e.message); }
  }
  async function loginAdmin() {
    const password = document.getElementById('adminPass').value;
    if (!password) return showToast('Введите пароль');
    try {
      const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('tulpar_admin_token', data.token);
      location.href = '/admin';
    } catch(e) { showToast(e.message); }
  }
  // Auto-check if already logged in
  if (localStorage.getItem('tulpar_token')) location.href = '/dashboard';
  // Show admin tab only with secret key: /login?key=tulpar
  if (location.search.includes('key=tulpar')) {
    document.getElementById('tabsBar').style.display = 'flex';
    switchTab('admin');
  }
</script>
</body>
</html>
